# CI/CD Pipeline for matric-eval
# Runs tests, linting, and coverage checks on every push and PR
# Publishes packages on tagged releases

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    container: python:3.11
    timeout-minutes: 10
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: |
          git clone --depth 1 --single-branch \
            https://oauth2:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --extra dev

      - name: Run ruff check
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run ruff check src/ tests/ || true
        continue-on-error: true

      - name: Run ruff format check
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run ruff format --check src/ tests/ || true
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    container: python:3.11
    timeout-minutes: 15
    needs: lint
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: |
          git clone --depth 1 --single-branch \
            https://oauth2:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --extra dev

      - name: Run unit tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest tests/unit/ -v --tb=short -m "unit" || uv run pytest tests/unit/ -v --tb=short

      - name: Run all tests with coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest tests/ \
            --cov=src/matric_eval \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v --tb=short || true

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    container: python:3.11
    timeout-minutes: 5
    needs: lint
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: |
          git clone --depth 1 --single-branch \
            https://oauth2:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --extra dev

      - name: Run smoke tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest tests/unit/ \
            -v --tb=short \
            --maxfail=5 \
            -x

      - name: Verify CLI help
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run python -m matric_eval.cli --help

  build:
    name: Build Package
    runs-on: ubuntu-latest
    container: python:3.11
    timeout-minutes: 10
    needs: [test, smoke]
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: |
          git clone --depth 1 --single-branch \
            https://oauth2:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build package
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv build

      - name: Verify package
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ls -la dist/
          pip install dist/*.whl
          python -c "import matric_eval; print('Version:', matric_eval.__version__)"

  publish:
    name: Publish to Gitea
    runs-on: ubuntu-latest
    container: python:3.11
    timeout-minutes: 10
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout code
        run: |
          git clone --depth 1 --single-branch \
            https://oauth2:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build package
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv build

      - name: Publish to Gitea PyPI
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip install twine
          twine upload \
            --repository-url https://git.integrolabs.net/api/packages/roctinam/pypi \
            --username roctinam \
            --password "${GITEA_TOKEN}" \
            dist/*
